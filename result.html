<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Result | IGS Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2e7d32; --bg: #f8fafc; }
        body { 
            margin: 0; font-family: 'Inter', sans-serif; background: var(--bg);
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .result-card {
            background: white; padding: 50px; border-radius: 30px; width: 100%; max-width: 500px;
            text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.1); border-top: 10px solid var(--primary);
        }
        .confetti-icon { font-size: 60px; color: #ffd700; margin-bottom: 20px; }
        h1 { margin: 0; color: var(--primary); font-size: 32px; font-weight: 900; }
        .subject-tag { display: inline-block; padding: 8px 20px; background: #e8f5e9; color: #2e7d32; border-radius: 50px; font-weight: 700; margin-top: 15px; }
        
        .score-circle {
            width: 150px; height: 150px; border: 8px solid #f1f5f9; border-top-color: var(--primary);
            border-radius: 50%; margin: 30px auto; display: flex; align-items: center; justify-content: center;
            font-size: 36px; font-weight: 900; color: #1e293b; flex-direction: column;
        }
        .score-circle span { font-size: 14px; color: #64748b; font-weight: 400; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 40px; }
        .btn { padding: 16px; border-radius: 12px; font-weight: 700; text-decoration: none; transition: 0.3s; }
        .btn-history { background: var(--primary); color: white; }
        .btn-dash { background: #f1f5f9; color: #1e293b; }
        .btn:hover { transform: translateY(-3px); opacity: 0.9; }
    </style>
</head>
<body>

<div class="result-card">
    <div class="confetti-icon"><i class="fas fa-trophy"></i></div>
    <h1>Exam Submitted!</h1>
    <div class="subject-tag" id="resSubject">Mathematics</div>

    <div class="score-circle">
        <div id="resScore">0</div>
        <span id="resTotal">out of 20</span>
    </div>

    <p style="color: #64748b; line-height: 1.6;">Great job! Your score has been added to your academic performance records.</p>

    <div class="btn-group">
        <a href="history.html" class="btn btn-history">View History</a>
        <a href="dashboard.html" class="btn btn-dash">Dashboard</a>
    </div>
</div>

<script>
    // Logic to grab result from URL or LocalStorage
    const params = new URLSearchParams(window.location.search);
    const score = params.get('score') || 0;
    const total = params.get('total') || 10;
    const subject = params.get('sub') || "Examination";

    document.getElementById('resScore').innerText = score;
    document.getElementById('resTotal').innerText = `out of ${total}`;
    document.getElementById('resSubject').innerText = subject;

    // Save to History (LocalStorage replaces the PHP Session logs)
    const history = JSON.parse(localStorage.getItem('igs_history')) || [];
    history.push({
        date: new Date().toLocaleString(),
        subject: subject,
        score: `${score}/${total}`
    });
    localStorage.setItem('igs_history', JSON.stringify(history));
</script>

</body>
</html>
